<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="card" style="border: 1px solid yellow;">
            <h1>Login</h1>
            <p class="subtitle">Please enter your details</p>

            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fa-solid fa-envelope" style="color: #0d6efd;"></i> Email address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-lock" style="color: yellowgreen;"></i> Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-primary">Sign in</button>

                <p class="signup-text">
                    Don't have an account? <a href="/register">Sign up <i class="fa-solid fa-user-plus" style="color: #0d6efd;"></i></a>
                </p>
            </form>
        </div>
    </div>

    <div id="errorPopup" class="popup">
        <div class="popup-content">
            <span class="close-btn">&times;</span>
            <p id="popupMessage"></p>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
</body>
</html>
