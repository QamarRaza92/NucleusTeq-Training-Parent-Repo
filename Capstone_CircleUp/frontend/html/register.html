<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="card-header">
                <h1>Register</h1>
                <p>Create your account to create or join activities</p>
            </div>

            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group full-width">
                        <label><i class="fa-solid fa-user" style="color: green;"></i> Full name <span class="required">*</span></label>
                        <input type="text" id="name" placeholder="e.g., Qamar Raza" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label><i class="fa-solid fa-envelope" style="color: #0d6efd;"></i> Email address <span class="required">*</span></label>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label><i class="fa-solid fa-lock" style="color: yellowgreen;"></i> Password <span class="required">*</span></label>
                        <input type="password" id="password" placeholder="Create a strong password" required>
                        <div class="password-strength" id="passwordStrength"></div>
                        <ul class="password-requirements" id="passwordReq">
                            <li id="reqLength">✓ 8-15 characters</li>
                            <li id="reqUpper">✓ At least 1 uppercase letter</li>
                            <li id="reqSpecial">✓ At least 1 special character (!@#$%^&*)</li>
                        </ul>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label><i class="fa-solid fa-phone" style="color: #198754;"></i> Phone number <span class="required">*</span></label>
                        <input type="tel" id="phone" placeholder="98765 43210" required>
                    </div>
                </div>

              <div class="form-row">
                <div class="form-group full-width">
                    <label><i class="fa-solid fa-user-gear" style="color: rgb(121, 187, 145);"></i> City <span class="required">*</span></label>
                    <select id="city" class="role-select" required>
                        <option value="Mumbai">Mumbai</option>
                        <option value="New Delhi">New Delhi</option>
                        <option value="Bengaluru">Bengaluru</option>
                        <option value="Indore">Indore</option>
                        <option value="california">California</option>
                        <option value="Alburquerque">Alburquerque</option>
                        <option value="New York">New York</option>
                        <option value="Scranton">Scranton</option>
                        <option value="Pune">Pune</option>
                        <option value="Patna">Patna</option>
                        <option value="Jaipur">Jaipur</option>
                        <option value="Lucknow">Lucknow</option>
                        <option value="Hyderabad">Hyderabad</option>
                    </select>
                </div>
              </div>

              <div class="form-row">
                    <div class="form-group full-width">
                        <label><i class="fa-solid fa-user" style="color: green;"></i> Bio</label>
                        <input type="text" id="bio" placeholder="e.g. Living my dreams">
                    </div>
                </div>

                <button type="submit" class="btn-primary">Create account →</button>

                <p class="login-link">
                    Already have an account? <a href="/"><i class="fa-solid fa-key" style="color: #0dcaf0;"></i> Sign in</a>
                </p>
            </form>
        </div>
    </div>

    <div id="errorPopup" class="popup">
        <div class="popup-content">
            <span class="close-btn">&times;</span>
            <p id="popupMessage"></p>
        </div>
    </div>
    <script src="/static/js/auth.js"></script>
</body>
</html>
