<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="card-header">
                <h1>Register</h1>
                <p>Create your account to start booking or organizing events</p>
            </div>

            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Full name</label>
                        <input type="text" id="name" placeholder="e.g., Qamar Raza" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Email address</label>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Create a strong password" required>
                        <div class="password-strength" id="passwordStrength"></div>
                        <ul class="password-requirements" id="passwordReq">
                            <li id="reqLength">✓ 8-12 characters</li>
                            <li id="reqUpper">✓ At least 1 uppercase letter</li>
                            <li id="reqSpecial">✓ At least 1 special character (!@#$%^&*)</li>
                        </ul>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Phone number</label>
                        <input type="tel" id="phone" placeholder="+91 98765 43210" required>
                    </div>
                </div>

              <div class="form-row">
    <div class="form-group full-width">
        <label>Role</label>
        <select id="role" class="role-select" required>
            <option value="">Select role</option>
            <option value="CUSTOMER">CUSTOMER</option>
            <option value="ORGANIZER">ORGANIZER</option>
        </select>
    </div>
</div>

                <button type="submit" class="register-btn">Create account →</button>

                <p class="login-link">
                    Already have an account? <a href="login.html">Sign in</a>
                </p>
            </form>
        </div>
    </div>

    <div id="errorPopup" class="popup">
        <div class="popup-content">
            <span class="close-btn">&times;</span>
            <p id="popupMessage"></p>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
