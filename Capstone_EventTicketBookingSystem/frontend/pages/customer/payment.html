<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/customer/payment.css">
</head>
<body>
    <div class="payment-container">
        <div class="payment-card">
            <h2>💳 Payment</h2>
            <p>Event ID: <span id="eventId"></span></p>
            <p>Tickets: <span id="tickets"></span></p>
            <div class="amount">₹<span id="amount"></span></div>
            <button id="payBtn" class="pay-btn" onclick="processPayment()">Pay Now</button>
            <div id="loader" class="loader">Processing...</div>
        </div>
    </div>
    <div id="errorPopup" class="popup">
        <div class="popup-content">
            <span class="close-btn">&times;</span>
            <p id="popupMessage"></p>
        </div>
    </div>
    <script src="../../js/auth.js"></script>
    <script src="../../js/customer/payment.js"></script>
</body>
</html>
