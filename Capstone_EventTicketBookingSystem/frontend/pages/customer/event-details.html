<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/customer/event-details.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="details-container">
        <div class="details-card">
            <button class="btn-back" onclick="goBack()">Back</button>
            
            <div id="eventDetails" class="event-details">
                <div class="loading">Loading...</div>
            </div>

            <div id="bookingSection" class="booking-section" style="display: none;">
                <h3>Book Tickets</h3>
                <div class="ticket-select">
                    <label>Number of Tickets:</label>
                    <input type="number" id="ticketCount" min="1" value="1">
                </div>
                <div class="total-amount">Total: ₹<span id="totalAmount">0</span></div>
                <button id="bookNowBtn" class="btn-back">Proceed to Payment →</button>
            </div>
        </div>
    </div>

    <div id="errorPopup" class="popup">
        <div class="popup-content">
            <span class="close-btn">&times;</span>
            <p id="popupMessage"></p>
        </div>
    </div>
    <script src="../../js/auth.js"></script>
    <script src="../../js/customer/event-details.js"></script>
</body>
</html>
