<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/organizer/create-event.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="form-container">
        <div class="form-card">
            <h1><i class="fa-solid fa-plus" style="color: #27ae60;"></i> Create New Event</h1>
            <p class="subtitle">Fill the details below</p>

            <form id="createEventForm">
                <div class="form-group">
                    <label><i class="fa-solid fa-bullseye" style="color: #e74c3c;"></i> Event Name</label>
                    <input type="text" id="name" placeholder="e.g., Music Concert" required>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-pen-to-square" style="color: #34495e;"></i> Description</label>
                    <textarea id="description" rows="3" placeholder="Describe your event..." required></textarea>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label><i class="fa-solid fa-calendar-days" style="color: #3498db;"></i> Event Date</label>
                        <input type="date" id="eventDate" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-clock" style="color: #f39c12;"></i> Start Time</label>
                        <input type="time" id="startTime" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-clock" style="color: #f39c12;"></i> End Time</label>
                        <input type="time" id="endTime" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-location-dot" style="color: #c0392b;"></i> Venue</label>
                    <input type="text" id="venue" placeholder="Event location" required>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label><i class="fa-solid fa-chair" style="color: #8e44ad;"></i> Total Seats</label>
                        <input type="number" id="totalSeats" placeholder="100" min="1" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-circle-dollar-to-slot" style="color: #2ecc71;"></i> Price (₹)</label>
                        <input type="number" id="price" placeholder="500" min="1" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-tag" style="color: #1abc9c;"></i> Category (Optional)</label>
                    <input type="text" id="category" placeholder="Music, Tech, Sports...">
                </div>

                <button type="submit" class="submit-btn"><i class="fa-solid fa-wand-magic-sparkles" style="color: #f1c40f;"></i> Create Event</button>
                <p class="back-link"><a href="dashboard.html">Back to Dashboard</a></p>
            </form>
        </div>
    </div>

    <div id="errorPopup" class="popup">
        <div class="popup-content">
            <span class="close-btn">&times;</span>
            <p id="popupMessage"></p>
        </div>
    </div>

    <script src="../../js/auth.js"></script>
    <script src="../../js/organizer/create-event.js"></script>
</body>
</html>
